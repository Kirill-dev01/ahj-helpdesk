<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk</title>
</head>

<body>
    <div class="app-container">
        <div class="header">
            <button id="add-ticket-btn" class="btn btn-primary">Добавить тикет</button>
        </div>

        <div id="tickets-list" class="tickets-list">
        </div>
    </div>

    <div id="ticket-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Добавить тикет</h3>
            <form id="ticket-form">
                <div class="form-group">
                    <label>Краткое описание</label>
                    <input type="text" id="ticket-name" required>
                </div>
                <div class="form-group">
                    <label>Подробное описание</label>
                    <textarea id="ticket-description" rows="4"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-cancel" id="cancel-modal-btn">Отмена</button>
                    <button type="submit" class="btn btn-primary">ОК</button>
                </div>
            </form>
        </div>
    </div>

    <div id="delete-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Удалить тикет</h3>
            <p>Вы уверены, что хотите удалить этот тикет? Это действие необратимо.</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-cancel" id="cancel-delete-btn">Отмена</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">ОК</button>
            </div>
        </div>
    </div>
</body>

</html>
